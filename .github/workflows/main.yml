name: Build Godot Project
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # 先获取版本号
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version
        id: extract
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  build:
    needs: get-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [windows, linux]
        include:
          - platform: windows
            export_preset: "Windows Desktop"
            export_path: "build/windows/TriHorny4Link.exe"
          - platform: linux
            export_preset: "Linux"
            export_path: "build/linux/034GameJam"

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Set version environment
        run: |
          echo "VERSION=${{ needs.get-version.outputs.version }}" >> $GITHUB_ENV

      - name: Setup Godot 4.6.1
        run: |
          # 下载 Godot 4.6.1 编辑器
          wget https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          unzip Godot_v4.6.1-stable_linux.x86_64.zip
          chmod +x Godot_v4.6.1-stable_linux.x86_64
          sudo mv Godot_v4.6.1-stable_linux.x86_64 /usr/local/bin/godot
          
          # 下载并安装导出模板
          mkdir -p ~/.local/share/godot/export_templates/4.6.1.stable
          wget https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz
          unzip Godot_v4.6.1-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/4.6.1.stable
          mv ~/.local/share/godot/export_templates/4.6.1.stable/templates/* ~/.local/share/godot/export_templates/4.6.1.stable/
          rm -f Godot_v4.6.1-stable_*.zip Godot_v4.6.1-stable_*.tpz
          
          godot --version

      - name: Export for ${{ matrix.platform }}
        run: |
          # 创建导出目录
          mkdir -p build/${{ matrix.platform }}
          
          # 导出游戏
          godot --headless --export-release "${{ matrix.export_preset }}" "${{ matrix.export_path }}"
          
          # 重命名文件，添加版本号
          if [ "${{ matrix.platform }}" == "windows" ]; then
            if [ -f "${{ matrix.export_path }}" ]; then
              FINAL_NAME="TriHorny4Link-${{ needs.get-version.outputs.version }}-windows.exe"
              cp "${{ matrix.export_path }}" "$FINAL_NAME"
              echo "FINAL_NAME=$FINAL_NAME" >> $GITHUB_ENV
              echo "✅ Windows build: $FINAL_NAME"
            fi
          else
            if [ -f "build/linux/034GameJam" ]; then
              FINAL_NAME="TriHorny4Link-${{ needs.get-version.outputs.version }}-linux.x86_64"
              cp "build/linux/034GameJam" "$FINAL_NAME"
              chmod +x "$FINAL_NAME"
              echo "FINAL_NAME=$FINAL_NAME" >> $GITHUB_ENV
              echo "✅ Linux build: $FINAL_NAME"
            elif [ -d "build/linux" ]; then
              FINAL_NAME="TriHorny4Link-${{ needs.get-version.outputs.version }}-linux.tar.gz"
              tar -czf "$FINAL_NAME" -C build/linux .
              echo "FINAL_NAME=$FINAL_NAME" >> $GITHUB_ENV
              echo "✅ Linux build packaged: $FINAL_NAME"
            fi
          fi
          
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TriHorny4Link-${{ needs.get-version.outputs.version }}-${{ matrix.platform }}
          path: ${{ env.FINAL_NAME }}
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all builds
        uses: actions/download-artifact@v4
        with:
          path: ./releases
          merge-multiple: true

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          PREVIOUS_TAG=$(git tag --sort=-v:refname | head -n 2 | tail -n 1)
          
          cat > release_notes.md << EOF
          # 🎮 TriHorny4Link $VERSION 发布
          
          ## ✨ 更新内容
          
          $(if [ -n "$PREVIOUS_TAG" ]; then
            git log --pretty=format:"- %s (%h)" $PREVIOUS_TAG..HEAD
          else
            echo "- 首次发布"
          fi)
          
          ## 📦 下载
          
          | 平台 | 文件 | 大小 |
          |------|------|------|
          | Windows | \`TriHorny4Link-$VERSION-windows.exe\` | $(ls -lh releases/TriHorny4Link-$VERSION-windows.exe 2>/dev/null | awk '{print $5}' || echo "N/A") |
          | Linux | \`TriHorny4Link-$VERSION-linux.x86_64\` | $(ls -lh releases/TriHorny4Link-$VERSION-linux.x86_64 2>/dev/null | awk '{print $5}' || echo "N/A") |
          
          ## 🚀 安装说明
          
          ### Windows
          直接运行 \`TriHorny4Link-$VERSION-windows.exe\`
          
          ### Linux
          \`\`\`bash
          chmod +x TriHorny4Link-$VERSION-linux.x86_64
          ./TriHorny4Link-$VERSION-linux.x86_64
          \`\`\`
          
          ## 🔄 完整变更
          \${{ github.server_url }}/\${{ github.repository }}/compare/$PREVIOUS_TAG...${{ github.ref_name }}
          EOF

      - name: List downloaded files
        run: ls -la releases/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: releases/*
          body_path: release_notes.md
          name: TriHorny4Link ${{ needs.get-version.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
