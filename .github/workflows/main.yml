name: Build Godot Project
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)'
        required: true
        default: '1.0.0'
        type: string
      platform:
        description: '编译平台'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - linux

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version
        id: extract
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
            VERSION=${VERSION#v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  # 新增：确定要编译的平台
  set-matrix:
    runs-on: ubuntu-latest
    needs: get-version
    outputs:
      platform: ${{ steps.set-platform.outputs.platform }}
    steps:
      - id: set-platform
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PLATFORM_INPUT="${{ github.event.inputs.platform }}"
            if [ "$PLATFORM_INPUT" == "all" ]; then
              echo 'platform=["windows", "linux"]' >> $GITHUB_OUTPUT
            else
              echo "platform=[\"$PLATFORM_INPUT\"]" >> $GITHUB_OUTPUT
            fi
          else
            echo 'platform=["windows", "linux"]' >> $GITHUB_OUTPUT
          fi

  build:
    needs: [get-version, set-matrix]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: ${{ fromJSON(needs.set-matrix.outputs.platform) }}
        include:
          - platform: windows
            export_preset: "Windows Desktop"
            export_path: "build/windows/TriHorny4Link.exe"
            final_ext: "exe"
          - platform: linux
            export_preset: "Linux"
            export_path: "build/linux/034GameJam"
            final_ext: "x86_64"

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Setup Godot 4.6.1
        run: |
          # 下载 Godot 4.6.1 编辑器
          wget -q https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          unzip -q Godot_v4.6.1-stable_linux.x86_64.zip
          chmod +x Godot_v4.6.1-stable_linux.x86_64
          sudo mv Godot_v4.6.1-stable_linux.x86_64 /usr/local/bin/godot
          
          # 下载并安装导出模板
          mkdir -p ~/.local/share/godot/export_templates/4.6.1.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz
          unzip -q Godot_v4.6.1-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/4.6.1.stable
          mv ~/.local/share/godot/export_templates/4.6.1.stable/templates/* ~/.local/share/godot/export_templates/4.6.1.stable/
          rm -f Godot_v4.6.1-stable_*.zip Godot_v4.6.1-stable_*.tpz
          
          godot --version

      - name: Export for ${{ matrix.platform }}
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          
          # 创建导出目录
          mkdir -p build/${{ matrix.platform }}
          
          # 导出游戏
          echo "Exporting for ${{ matrix.platform }}..."
          godot --headless --export-release "${{ matrix.export_preset }}" "${{ matrix.export_path }}"
          
          # 处理导出文件
          if [ "${{ matrix.platform }}" == "windows" ]; then
            if [ -f "${{ matrix.export_path }}" ]; then
              FINAL_NAME="TriHorny4Link-${VERSION}-windows.${{ matrix.final_ext }}"
              cp "${{ matrix.export_path }}" "$FINAL_NAME"
              echo "✅ Windows build: $FINAL_NAME"
            else
              echo "❌ Windows build failed: ${{ matrix.export_path }} not found"
              exit 1
            fi
          else  # linux
            if [ -f "build/linux/034GameJam" ]; then
              FINAL_NAME="TriHorny4Link-${VERSION}-linux.${{ matrix.final_ext }}"
              cp "build/linux/034GameJam" "$FINAL_NAME"
              chmod +x "$FINAL_NAME"
              echo "✅ Linux build: $FINAL_NAME"
            elif [ -d "build/linux" ]; then
              FINAL_NAME="TriHorny4Link-${VERSION}-linux.tar.gz"
              tar -czf "$FINAL_NAME" -C build/linux .
              echo "✅ Linux build packaged: $FINAL_NAME"
            else
              echo "❌ Linux build failed"
              exit 1
            fi
          fi
          
          echo "FINAL_NAME=$FINAL_NAME" >> $GITHUB_ENV
          ls -la "$FINAL_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TriHorny4Link-${{ needs.get-version.outputs.version }}-${{ matrix.platform }}
          path: ${{ env.FINAL_NAME }}
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    # 只在标签触发时创建 Release
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all builds
        uses: actions/download-artifact@v4
        with:
          path: ./releases
          merge-multiple: true

      - name: List downloaded files
        run: ls -la releases/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: releases/*
          generate_release_notes: true
          name: TriHorny4Link ${{ needs.get-version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
